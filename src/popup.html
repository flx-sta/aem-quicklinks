<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <span class="logo"
        ><span class="logo-accent">&gt;</span> AEM Quicklinks</span
      >
      <a id="settings" title="Settings">&#9881;</a>
    </header>

    <div id="status-bar">
      <span id="status-icon"></span>
      <span id="status-text">Detecting&hellip;</span>
    </div>

    <div id="path-display"></div>

    <nav class="tabs">
      <button class="tab active" data-panel="navigate" id="nav-tab">
        Navigate <kbd>N</kbd>
      </button>
      <button class="tab" data-panel="environment" id="env-tab">
        Environment <kbd>D</kbd>
      </button>
    </nav>

    <section id="navigate" class="panel">
      <div class="link-grid">
        <button
          id="btn-preview"
          class="link-btn preview"
          disabled
          title="Preview (P)"
        >
          <span class="link-label">Preview</span>
          <kbd>P</kbd>
        </button>
        <button
          id="btn-editor"
          class="link-btn editor"
          disabled
          title="Editor (E)"
        >
          <span class="link-label">Editor</span>
          <kbd>E</kbd>
        </button>
        <button
          id="btn-properties"
          class="link-btn properties"
          disabled
          title="Properties (R)"
        >
          <span class="link-label">Properties</span>
          <kbd>R</kbd>
        </button>
        <button
          id="btn-crxde"
          class="link-btn crxde"
          disabled
          title="CRXDE (C)"
        >
          <span class="link-label">CRXDE</span>
          <kbd>C</kbd>
        </button>
        <button
          id="btn-sites"
          class="link-btn sites"
          disabled
          title="Sites (S)"
        >
          <span class="link-label">Sites</span>
          <kbd>S</kbd>
        </button>
      </div>
    </section>

    <section id="environment" class="panel" style="display: none">
      <span class="env-label"
        >Switch environment <kbd>D</kbd> then <kbd>1</kbd>-<kbd>9</kbd></span
      >
      <div class="env-list" id="env-list"></div>
      <p id="no-env" class="no-env">
        No matching environment found.<br /><a href="#" id="open-settings"
          >Configure domains in Settings</a
        >
      </p>
    </section>

    <script type="module" src="popup.ts"></script>
  </body>
</html>
